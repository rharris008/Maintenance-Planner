<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ABH Maintenance System</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" href="favicon-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#f0b429;--accent2:#0ea5e9;
  --red:#ef4444;--orange:#f97316;--green:#22c55e;--purple:#c084fc;
  --navy:#1B2A4A;--pureau:#0E7CCE;
  /* Section colours */
  --daily-bg:#0c1e3a;--daily-hdr:#0e4f8f;--daily-border:#1a6bbf;--daily-text:#60a5fa;
  --weekly-bg:#1a0f2e;--weekly-hdr:#5b21b6;--weekly-border:#7c3aed;--weekly-text:#a78bfa;
  --monthly-bg:#1f1400;--monthly-hdr:#92400e;--monthly-border:#d97706;--monthly-text:#fbbf24;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
  --r:8px;--nav:224px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;overflow:hidden}
#app{display:flex;height:100vh}
.sidebar{width:var(--nav);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:20;transition:transform .25s}
.logo{padding:18px 20px 14px;border-bottom:1px solid var(--border)}
.logo-img{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-badge{background:var(--pureau);color:#fff;font-family:var(--fd);font-size:13px;font-weight:800;letter-spacing:2px;padding:3px 8px;border-radius:4px}
.logo-name{font-family:var(--fd);font-size:20px;font-weight:800;color:var(--text);letter-spacing:.5px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.nav-section-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:10px 20px 2px;opacity:.7;display:block}
.nav-items{flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-left:3px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(240,180,41,.08)}
.nav-item svg{flex-shrink:0;width:15px;height:15px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 6px;font-family:var(--fd)}
.nav-footer{padding:12px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);line-height:1.7}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:4px}
.topbar-title{font-family:var(--fd);font-size:22px;font-weight:700;letter-spacing:.5px}
.topbar-date{font-size:11px;color:var(--muted)}
.content{flex:1;overflow-y:auto;padding:20px 24px}
@media(max-width:768px){
  .sidebar{position:fixed;inset:0 auto 0 0;transform:translateX(-100%);z-index:100}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:block}
  .content{padding:14px}
  .stat-grid{grid-template-columns:1fr 1fr!important}
  .machine-grid{grid-template-columns:1fr!important}
  .form-grid{grid-template-columns:1fr!important}
  .overlay{display:block!important}
}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-title{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat.alert-card{border-color:var(--red);background:rgba(239,68,68,.06)}
.stat.warn-card{border-color:var(--orange);background:rgba(249,115,22,.06)}
.stat.ok-card{border-color:var(--green);background:rgba(34,197,94,.06)}
.stat-num{font-family:var(--fd);font-size:40px;font-weight:800;line-height:1}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:9px 12px;text-align:left;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:8px 12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.row-click:hover td{background:rgba(255,255,255,.03);cursor:pointer}
.tbl-wrap{overflow-x:auto}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--fd);white-space:nowrap}
.machine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.mcard:hover{background:var(--surface2);border-color:var(--accent2)}
.mcard.sel{border-left-color:var(--accent)!important;background:rgba(240,180,41,.05)}
.mcard-name{font-family:var(--fd);font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.2}
.mcard-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:9px 11px;font-size:13px;font-family:var(--fb);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
select option{background:var(--surface2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:var(--fb)}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#fbbf24}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-danger:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:6px 11px;font-size:12px}
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-row input{flex:1;min-width:160px}
.filter-row select{width:160px}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;gap:2px;overflow-x:auto}
.tab{padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;font-family:var(--fd);white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:12px}
.drow:last-child{border-bottom:none}
.dkey{color:var(--muted);font-weight:500;flex-shrink:0}
.dval{font-weight:500;text-align:right;word-break:break-word}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:300;display:none;animation:slideUp .3s ease}
#toast.success{background:var(--green);color:#000}
#toast.error{background:var(--red);color:#fff}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;gap:12px;color:var(--muted)}
.alert-strip{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:var(--r);padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;color:var(--red)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.conn-status{display:flex;align-items:center;gap:6px;font-size:11px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.conn-dot.err{background:var(--red)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:var(--fd);font-size:22px;font-weight:700}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ══ PM SECTION COLLAPSIBLES ══════════════════════════════ */
.pm-section{border-radius:var(--r);margin-bottom:14px;overflow:hidden;border:1px solid}
.pm-section.daily{border-color:var(--daily-border);background:var(--daily-bg)}
.pm-section.weekly{border-color:var(--weekly-border);background:var(--weekly-bg)}
.pm-section.monthly{border-color:var(--monthly-border);background:var(--monthly-bg)}

.pm-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none}
.pm-section.daily .pm-section-hdr{background:var(--daily-hdr)}
.pm-section.weekly .pm-section-hdr{background:var(--weekly-hdr)}
.pm-section.monthly .pm-section-hdr{background:var(--monthly-hdr)}

.pm-section-left{display:flex;align-items:center;gap:12px}
.pm-section-title{font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:.5px;color:#fff}
.pm-section-count{font-family:var(--fd);font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;color:#fff}
.pm-section.daily .pm-section-count{background:rgba(96,165,250,.3)}
.pm-section.weekly .pm-section-count{background:rgba(167,139,250,.3)}
.pm-section.monthly .pm-section-count{background:rgba(251,191,36,.3)}

.pm-section-right{display:flex;align-items:center;gap:10px}
.pm-override{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.2);transition:all .15s}
.pm-override:hover{background:rgba(255,255,255,.1)}
.pm-override input{width:14px;height:14px;cursor:pointer;accent-color:#fff;margin:0}
.pm-section-arrow{color:#fff;transition:transform .2s;flex-shrink:0}
.pm-section-arrow.open{transform:rotate(180deg)}

.pm-section-body{display:none;padding:0}
.pm-section-body.open{display:block}

.pm-locked{padding:14px 18px;font-size:13px;display:flex;align-items:center;gap:10px}
.pm-section.daily .pm-locked{color:var(--daily-text)}
.pm-section.weekly .pm-locked{color:var(--weekly-text)}
.pm-section.monthly .pm-locked{color:var(--monthly-text)}

/* ══ PM MACHINE GROUPS ════════════════════════════════════ */
.pm-machine-group{border-top:1px solid}
.pm-machine-group:first-child{border-top:none}
.pm-section.daily .pm-machine-group{border-color:rgba(96,165,250,.15)}
.pm-section.weekly .pm-machine-group{border-color:rgba(167,139,250,.15)}
.pm-section.monthly .pm-machine-group{border-color:rgba(251,191,36,.15)}

.pm-machine-label{padding:8px 18px;font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid}
.pm-section.daily .pm-machine-label{color:var(--daily-text);background:rgba(14,79,143,.4);border-color:rgba(96,165,250,.15)}
.pm-section.weekly .pm-machine-label{color:var(--weekly-text);background:rgba(91,33,182,.4);border-color:rgba(167,139,250,.15)}
.pm-section.monthly .pm-machine-label{color:var(--monthly-text);background:rgba(146,64,14,.4);border-color:rgba(251,191,36,.15)}

/* ══ TASK ROWS ════════════════════════════════════════════ */
.pm-task-row{display:grid;grid-template-columns:36px 1fr 120px 100px 90px 160px 140px;gap:0;align-items:center;border-bottom:1px solid;transition:background .1s}
.pm-section.daily .pm-task-row{border-color:rgba(96,165,250,.08)}
.pm-section.weekly .pm-task-row{border-color:rgba(167,139,250,.08)}
.pm-section.monthly .pm-task-row{border-color:rgba(251,191,36,.08)}
.pm-task-row:last-child{border-bottom:none}
.pm-task-row.done{opacity:.6}
.pm-task-row.done .pm-task-name{text-decoration:line-through;color:var(--muted)}
.pm-task-row:hover{background:rgba(255,255,255,.03)}

.pm-task-hdr{display:grid;grid-template-columns:36px 1fr 120px 100px 90px 160px 140px;gap:0;padding:6px 0;border-bottom:1px solid;margin-bottom:0}
.pm-section.daily .pm-task-hdr{border-color:rgba(96,165,250,.25)}
.pm-section.weekly .pm-task-hdr{border-color:rgba(167,139,250,.25)}
.pm-section.monthly .pm-task-hdr{border-color:rgba(251,191,36,.25)}

.pm-th{padding:6px 12px;font-family:var(--fd);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.pm-th:first-child{padding-left:10px}

.pm-td{padding:9px 12px;font-size:13px;vertical-align:middle}
.pm-td:first-child{padding-left:10px;text-align:center}

.pm-task-name{font-weight:500}
.pm-task-sop{font-size:10px;color:var(--accent2);font-family:monospace}
.pm-task-craft{font-size:12px;color:var(--muted)}
.pm-task-time{font-size:12px;color:var(--muted)}

/* Completion checkbox */
.pm-check{width:18px;height:18px;cursor:pointer;border-radius:4px;accent-color:var(--green);flex-shrink:0}
.pm-section.daily .pm-check{accent-color:#60a5fa}
.pm-section.weekly .pm-check{accent-color:#a78bfa}
.pm-section.monthly .pm-check{accent-color:#fbbf24}

/* Staff dropdown in task row */
.pm-staff-sel{background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 6px;font-size:11px;font-family:var(--fb);outline:none;width:100%;cursor:pointer}
.pm-staff-sel:focus{border-color:var(--accent)}

/* Completion stamp */
.pm-stamp{font-size:10px;font-weight:600;color:var(--green);white-space:nowrap}

/* Progress bar */
.pm-progress-wrap{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden}
.pm-progress-bar{height:100%;border-radius:2px;transition:width .3s}
.pm-section.daily .pm-progress-bar{background:var(--daily-text)}
.pm-section.weekly .pm-progress-bar{background:var(--weekly-text)}
.pm-section.monthly .pm-progress-bar{background:var(--monthly-text)}

/* Completion summary chip */
.pm-complete-chip{font-family:var(--fd);font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;color:#fff}
.pm-section.daily .pm-complete-chip{background:rgba(96,165,250,.3)}
.pm-section.weekly .pm-complete-chip{background:rgba(167,139,250,.3)}
.pm-section.monthly .pm-complete-chip{background:rgba(251,191,36,.3)}

/* ══ PM TOP BAR ═══════════════════════════════════════════ */
.pm-topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.pm-meta{font-size:13px;color:var(--muted)}
.pm-meta strong{color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-img">
        <div class="logo-badge">ABH</div>
        <div class="logo-name">MAINTENANCE</div>
      </div>
      <div class="logo-sub">Maintenance System</div>
    </div>
    <div class="nav-items" id="nav-items"></div>
    <div class="nav-footer">
      <div class="conn-status"><div class="conn-dot" id="conn-dot"></div><span id="conn-label">Connecting…</span></div>
      <div style="margin-top:4px">Australian Beverage Holdings · v3.0</div>
    </div>
  </div>
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div>
          <div class="topbar-title" id="page-title">Dashboard</div>
          <div class="topbar-date" id="page-date"></div>
        </div>
      </div>
      <div id="topbar-right"></div>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spinner"></div> Connecting to database…</div></div>
  </div>
</div>
<div id="machine-modal" style="display:none"></div>
<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://gdfbpvzatnqmzujagtqm.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdkZmJwdnphdG5xbXp1amFndHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MzE3NTQsImV4cCI6MjA5MDIwNzc1NH0.O0XquoCFEaIL0xJZKGaPrFgfz42A_j1uKRUjhr6Zqvw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  view:'dashboard', machines:[], pmTasks:[], spareParts:[], workOrders:[],
  sites:[], suppliers:[], alerts:[], statutory:[], staff:[],
  loaded:false, openBreakdowns:0, stockAlerts:0,
};

// PM completions: { taskId: { staffName, time, dbId } } — loaded from Supabase on load
let pmCompletions = {};
// Per-section overrides: { daily: bool, weekly: bool, monthly: bool }
let pmOverrides = { daily:false, weekly:false, monthly:false };
// Section open/closed state
let pmOpen = { daily:true, weekly:true, monthly:true };
// PM filters
let pmSite='All', pmLine='All';

const NAV = [
  { section:'Overview' },
  { id:'dashboard',   label:'Dashboard',             icon:'M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 4h2v-2h2v2h2v2h-2v2h-2v-2h-2z' },
  { section:'Maintenance' },
  { id:'pm-schedule', label:'Preventive Maintenance', icon:'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z' },
  { id:'log-pm',      label:'Log Preventive Task',            icon:'M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11' },
  { id:'breakdown',   label:'Raise Breakdown',        icon:'M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01', badge:'openBreakdowns' },

const woBadge = t => badge(t,t==='Breakdown'?'rgba(239,68,68,.15)':'rgba(34,197,94,.12)',t==='Breakdown'?'#ef4444':'#22c55e');
const woStatusBadge = s => { const m={Open:['rgba(239,68,68,.15)','#ef4444'],'In Progress':['rgba(249,115,22,.15)','#f97316'],'Awaiting Parts':['rgba(234,179,8,.15)','#eab308'],'Awaiting OEM':['rgba(168,85,247,.15)','#a855f7'],Closed:['rgba(139,148,158,.15)','#8b949e'],Cancelled:['rgba(139,148,158,.15)','#8b949e']}; const [bg,col]=m[s]||['rgba(139,148,158,.15)','#8b949e']; return badge(s,bg,col); };
const stockBadge = p => { if(p.current_qty<=0)return badge('OUT','rgba(239,68,68,.15)','#ef4444'); if(p.current_qty<=p.min_qty)return badge('LOW','rgba(249,115,22,.15)','#f97316'); return badge('OK','rgba(34,197,94,.1)','#22c55e'); };

// Staff eligibility filter — global so Log PM, Breakdown and PM screen all use it
function getEligibleStaff(machineId){
  const m=getMachine(machineId);
  if(!m||!state.staff.length) return state.staff;
  return state.staff.filter(function(s){
    // Exclude departed or on leave staff from all task dropdowns
    const es=s.employment_status||(s.is_active?'Employed':'Departed');
    if(es==='Departed'||es==='On Leave') return false;
    // Maintenance Manager (Ravindra) always eligible across all sites
    if(s.can_approve_wo && s.role==='Maintenance Manager') return true;
    // Site must match if both are set
    if(s.site_id && m.site_id && s.site_id!==m.site_id) return false;
    // line_type 'all' = any machine at their site
    if(s.line_type==='all') return true;
    // Shared machines (date coders, compressor) — anyone at the site can be assigned
    if(!m.line_type || m.line_type==='shared') return true;
    // Otherwise line_type must match
    return s.line_type===m.line_type;
  });
}

async function loadAll(){
  try {
    const [machines,pmTasks,parts,wos,sites,suppliers,alerts,statutory,staff] = await Promise.all([
      sb.from('machines').select('*').order('machine_code'),
      sb.from('pm_tasks').select('*').order('task_code'),
      sb.from('spare_parts').select('*').order('part_code'),
      sb.from('work_orders').select('*').order('date_raised',{ascending:false}),
      sb.from('sites').select('*'),
      sb.from('suppliers').select('*').order('name'),
      sb.from('alerts').select('*').eq('status','Active').order('created_at',{ascending:false}),
      sb.from('statutory_requirements').select('*').eq('is_active',true).order('next_due_date'),
      sb.from('staff').select('*').eq('is_active',true).order('name'),
    ]);
    state.machines=machines.data||[];
    state.pmTasks=pmTasks.data||[];
    state.spareParts=parts.data||[];
    state.workOrders=wos.data||[];
    state.sites=sites.data||[];
    state.suppliers=suppliers.data||[];
    state.alerts=alerts.data||[];
    state.statutory=statutory.data||[];
    state.staff=staff.data||[];
    state.openBreakdowns=state.workOrders.filter(w=>w.wo_type==='Breakdown'&&w.status==='Open').length;
    state.stockAlerts=state.spareParts.filter(p=>p.current_qty<=p.min_qty).length;
    // Load today's completions
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    const {data:todayComps}=await sb.from('pm_completions')
      .select('*').gte('completed_at',todayStart.toISOString());
    pmCompletions={};
    (todayComps||[]).forEach(c=>{
      pmCompletions[c.pm_task_id]={staffName:c.completed_by,time:new Date(c.completed_at),dbId:c.id};
    });
    state.loaded=true;
    $('conn-dot').classList.remove('err');
    $('conn-label').textContent='Connected';
    renderNav(); render();
  } catch(e){
    $('conn-dot').classList.add('err');
    $('conn-label').textContent='Connection error';
    $('content').innerHTML=`<div class="empty">&#10060; Could not connect.<br><small style="color:var(--muted)">${esc(e.message)}</small></div>`;
  }
}

function renderPMSchedule(){
  const now=new Date();
  const dow=now.getDay(); // 0=Sun,1=Mon
  const dom=now.getDate();
  const isMonday=dow===1;
  const isFirstOfMonth=dom===1;

  // Site / Line filter options
  const siteOpts=['All',...new Set(state.machines.filter(m=>m.site_id).map(m=>m.site_id))].map(sid=>{
    if(sid==='All')return{id:'All',label:'All Sites'};
    const s=state.sites.find(x=>x.id===sid);
    return{id:sid,label:s?.name||sid};
  });
  const sfMachines=pmSite==='All'?state.machines:state.machines.filter(m=>m.site_id===pmSite);
  const lineOpts=['All',...new Set(sfMachines.filter(m=>m.location_zone).map(m=>m.location_zone))];

  const filteredMachines=state.machines.filter(m=>{
    const sm=pmSite==='All'||m.site_id===pmSite;
    const lm=pmLine==='All'||m.location_zone===pmLine;
    return sm&&lm;
  });
  const fmIds=new Set(filteredMachines.map(m=>m.id));
  const visible=state.pmTasks.filter(t=>fmIds.has(t.machine_id));

  const daily=visible.filter(t=>t.frequency==='Daily');
  const weekly=visible.filter(t=>t.frequency==='Weekly');
  const monthly=visible.filter(t=>!['Daily','Weekly'].includes(t.frequency));

  function staffOpts(machineId, selectedName){
    const eligible=getEligibleStaff(machineId);
    if(!eligible.length) return '<option value="">— No staff for this line —</option>';
    return`<option value="">— Select —</option>`+eligible.map(s=>`<option value="${esc(s.name)}"${selectedName===s.name?' selected':''}>${esc(s.name)}${s.role==='Maintenance Manager'?' ★':''}</option>`).join('');
  }

  function completionStats(tasks){
    const done=tasks.filter(t=>pmCompletions[t.id]).length;
    return{done,total:tasks.length,pct:tasks.length?Math.round(done/tasks.length*100):0};
  }

  function buildSection(tasks, type, label, icon, isToday){
    if(!tasks.length)return'';
    const stats=completionStats(tasks);
    const isOpen=pmOpen[type];
    const isOverridden=pmOverrides[type];
    const showContent=isToday||isOverridden;

    // Group by machine
    const byMachine={};
    tasks.forEach(t=>{if(!byMachine[t.machine_id])byMachine[t.machine_id]=[];byMachine[t.machine_id].push(t);});

    const lockMsg={
      weekly:`Weekly tasks are scheduled for Mondays. ${isOverridden?'':'Use the override to view today.'}`,
      monthly:`Monthly tasks are scheduled for the 1st of the month. ${isOverridden?'':'Use the override to view today.'}`,
    }[type]||'';

    const overrideLabel=type==='daily'?'':'Show today';

    const machineRows=Object.entries(byMachine).map(([mid,tasks])=>{
      const m=getMachine(mid);if(!m)return'';
      const site=state.sites.find(s=>s.id===m.site_id);
      return`<div class="pm-machine-group">
        <div class="pm-machine-label">${esc(m.machine_code)} &mdash; ${esc(m.name)}<span style="font-weight:400;margin-left:8px;opacity:.7">${esc(site?.name||'')}${m.location_zone?' &middot; '+m.location_zone:''}</span></div>
        <div class="pm-task-hdr">
          <div class="pm-th"></div>
          <div class="pm-th">Task</div>
          <div class="pm-th">SOP Ref</div>
          <div class="pm-th">Craft</div>
          <div class="pm-th">Est.</div>
          <div class="pm-th">Assigned To</div>
          <div class="pm-th">Completed</div>
        </div>
        ${tasks.map(t=>{
          const c=pmCompletions[t.id];
          return`<div class="pm-task-row${c?' done':''}" id="row-${t.id}">
            <div class="pm-td"><input type="checkbox" class="pm-check" ${c?'checked':''} onchange="togglePMComplete('${t.id}','${type}',this)" title="Mark complete"></div>
            <div class="pm-td">
              <div class="pm-task-name">${esc(t.task_name)}</div>
              ${t.compliance_requirement?`<div style="margin-top:2px"><span class="badge" style="background:rgba(14,124,206,.15);color:#0E7CCE;font-size:9px">${esc(t.compliance_requirement)}</span></div>`:''}
              ${t.nsf_h1_lubricant?`<div style="margin-top:2px"><span class="badge" style="background:rgba(34,197,94,.1);color:#22c55e;font-size:9px">NSF H1</span></div>`:''}
            </div>
            <div class="pm-td"><code class="pm-task-sop">${esc(t.sop_reference||'—')}</code></div>
            <div class="pm-td pm-task-craft">${esc(t.craft||'—')}</div>
            <div class="pm-td pm-task-time">${t.estimated_duration_mins?t.estimated_duration_mins+' min':'—'}</div>
            <div class="pm-td">
              <select class="pm-staff-sel" id="staff-${t.id}" onchange="setPMStaff('${t.id}',this.value)" ${c?'disabled':''}>
                ${staffOpts(mid, c?.staffName||'')}
              </select>
            </div>
            <div class="pm-td" id="stamp-${t.id}">
              ${c?`<div class="pm-stamp">&#10003; ${esc(c.staffName)}<br><span style="font-weight:400;opacity:.7">${fmtTime(c.time)}</span></div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');

    return`<div class="pm-section ${type}" id="pm-sec-${type}">
      <div class="pm-section-hdr" onclick="togglePMSection('${type}')">
        <div class="pm-section-left">
          ${icon}
          <span class="pm-section-title">${label}</span>
          <span class="pm-section-count">${tasks.length} task${tasks.length!==1?'s':''}</span>
          ${stats.done>0?`<span class="pm-complete-chip">${stats.done}/${stats.total} done</span>`:''}
        </div>
        <div class="pm-section-right" onclick="event.stopPropagation()">
          ${type!=='daily'?`<label class="pm-override" title="Show this section regardless of day">
            <input type="checkbox" ${isOverridden?'checked':''} onchange="togglePMOverride('${type}',this.checked)">
            ${overrideLabel}
          </label>`:''}
          <svg class="pm-section-arrow ${isOpen?'open':''}" id="pm-arrow-${type}" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" onclick="event.stopPropagation();togglePMSection('${type}')"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      ${stats.total>0?`<div style="padding:0 18px 6px;background:${type==='daily'?'var(--daily-hdr)':type==='weekly'?'var(--weekly-hdr)':'var(--monthly-hdr)'}">
        <div class="pm-progress-wrap"><div class="pm-progress-bar" style="width:${stats.pct}%"></div></div>
      </div>`:''}
      <div class="pm-section-body ${isOpen?'open':''}" id="pm-body-${type}">
        ${!showContent
          ? `<div class="pm-locked"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>${lockMsg}</div>`
          : machineRows
        }
      </div>
    </div>`;
  }

  const dailyIcon=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  const weeklyIcon=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h2v2H7zm4 0h2v2h-2z"/></svg>`;
  const monthlyIcon=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

  // Completion summary across all visible
  const allDone=Object.keys(pmCompletions).filter(id=>fmIds.has(state.pmTasks.find(t=>t.id===id)?.machine_id)).length;

  $('content').innerHTML=`
    <div class="pm-topbar">
      <div class="pm-meta">
        ${state.pmTasks.length} total preventive tasks &mdash; showing <strong>${visible.length}</strong>
        ${allDone>0?`&mdash; <span style="color:var(--green);font-weight:600">${allDone} completed this session</span>`:''}
      </div>
      <div class="filter-row" style="margin:0">
        <select onchange="pmSite=this.value;pmLine='All';renderPMSchedule()">
          ${siteOpts.map(s=>`<option value="${s.id}"${pmSite===s.id?' selected':''}>${s.label}</option>`).join('')}
        </select>
        <select onchange="pmLine=this.value;renderPMSchedule()">
          ${lineOpts.map(l=>`<option value="${l}"${pmLine===l?' selected':''}>${l==='All'?'All Lines':l}</option>`).join('')}
        </select>
        <button class="btn btn-ghost btn-sm" onclick="pmSite='All';pmLine='All';renderPMSchedule()">Clear</button>
      </div>
    </div>
    ${!visible.length?`<div class="card"><div class="empty">No preventive tasks for current filter.</div></div>`:''}
    ${buildSection(daily,'daily','Daily Tasks',dailyIcon,true)}
    ${buildSection(weekly,'weekly','Weekly Tasks',weeklyIcon,isMonday)}
    ${buildSection(monthly,'monthly','Monthly &amp; Periodic Tasks',monthlyIcon,isFirstOfMonth)}
  `;
}

function togglePMSection(type){
  pmOpen[type]=!pmOpen[type];
  const body=$(`pm-body-${type}`);
  const arrow=$(`pm-arrow-${type}`);
  if(body)body.classList.toggle('open',pmOpen[type]);
  if(arrow)arrow.classList.toggle('open',pmOpen[type]);
}

function togglePMOverride(type,val){
  pmOverrides[type]=val;
  renderPMSchedule();
}

function setPMStaff(taskId,staffName){
  // Pre-select staff for when they tick the checkbox
  if(!pmCompletions[taskId]){
    // Store pending staff selection temporarily in DOM attribute
    const sel=$(`staff-${taskId}`);
    if(sel)sel.dataset.pending=staffName;
  }
}

async function togglePMComplete(taskId,type,checkbox){
  if(checkbox.checked){
    const sel=$(`staff-${taskId}`);
    const staffName=sel?.value||sel?.dataset?.pending||'';
    if(!staffName){
      checkbox.checked=false;
      showToast('Please select a staff member before marking complete.','error');
      return;
    }
    const task=state.pmTasks.find(t=>t.id===taskId);
    const now=new Date();
    // Save to Supabase
    const {data:saved,error}=await sb.from('pm_completions').insert({
      pm_task_id:taskId,
      machine_id:task?.machine_id||null,
      completed_by:staffName,
      completed_at:now.toISOString(),
    }).select().single();
    if(error){showToast('Could not save completion: '+error.message,'error');checkbox.checked=false;return;}
    pmCompletions[taskId]={staffName,time:now,dbId:saved.id};
    // Update row in-place without full re-render
    const row=$(`row-${taskId}`);
    if(row){
      row.classList.add('done');
      const stamp=$(`stamp-${taskId}`);
      if(stamp)stamp.innerHTML=`<div class="pm-stamp">&#10003; ${esc(staffName)}<br><span style="font-weight:400;opacity:.7">${fmtTime(now)}</span></div>`;
      if(sel){sel.disabled=true;}
      updatePMProgress(type);
    }
    showToast('Task marked complete.');
  } else {
    const existing=pmCompletions[taskId];
    if(existing?.dbId){
      const {error}=await sb.from('pm_completions').delete().eq('id',existing.dbId);
      if(error){showToast('Could not remove completion: '+error.message,'error');checkbox.checked=true;return;}
    }
    delete pmCompletions[taskId];
    const row=$(`row-${taskId}`);
    if(row){
      row.classList.remove('done');
      const stamp=$(`stamp-${taskId}`);
      if(stamp)stamp.innerHTML='';
      const sel=$(`staff-${taskId}`);
      if(sel){sel.disabled=false;}
      updatePMProgress(type);
    }
  }
}

function updatePMProgress(type){
  // Recalculate progress for a section without full re-render
  const now=new Date();
  const dow=now.getDay();
  const dom=now.getDate();
  const sfMachines=pmSite==='All'?state.machines:state.machines.filter(m=>m.site_id===pmSite);
  const fmIds=new Set((pmSite==='All'&&pmLine==='All'?state.machines:state.machines.filter(m=>{
    const sm=pmSite==='All'||m.site_id===pmSite;
    const lm=pmLine==='All'||m.location_zone===pmLine;
    return sm&&lm;
  })).map(m=>m.id));
  const visible=state.pmTasks.filter(t=>fmIds.has(t.machine_id));
  const sectionTasks=type==='daily'?visible.filter(t=>t.frequency==='Daily'):type==='weekly'?visible.filter(t=>t.frequency==='Weekly'):visible.filter(t=>!['Daily','Weekly'].includes(t.frequency));
  const done=sectionTasks.filter(t=>pmCompletions[t.id]).length;
  const total=sectionTasks.length;
  const pct=total?Math.round(done/total*100):0;
  // Update progress bar width
  const sec=$(`pm-sec-${type}`);
  if(sec){
    const bar=sec.querySelector('.pm-progress-bar');
    if(bar)bar.style.width=pct+'%';
    // Update count chip
    const chip=sec.querySelector('.pm-complete-chip');
    if(done>0){
      if(chip){chip.textContent=`${done}/${total} done`;}
      else{
        const left=sec.querySelector('.pm-section-left');
        if(left){const c=document.createElement('span');c.className='pm-complete-chip';c.textContent=`${done}/${total} done`;left.appendChild(c);}
      }
    } else if(chip){chip.remove();}
  }
}

let auditSite='All', auditLine='All', auditRange='30', auditSearch='', auditExpanded={};

async function renderAudit(){
  $('content').innerHTML='<div class="loading"><div class="spinner"></div> Loading audit data…</div>';

  // Date range
  const now=new Date();
  const rangeStart=new Date(now);
  if(auditRange==='7') rangeStart.setDate(now.getDate()-7);
  else if(auditRange==='30') rangeStart.setDate(now.getDate()-30);
  else rangeStart.setFullYear(now.getFullYear()-1);

  // Fetch completions for range
  const {data:comps,error}=await sb.from('pm_completions')
    .select('*')
    .gte('completed_at',rangeStart.toISOString())
    .order('completed_at',{ascending:false});

  if(error){$('content').innerHTML=`<div class="empty">Error loading audit data: ${esc(error.message)}</div>`;return;}

  // Filter machines by site/line
  const filteredMachines=state.machines.filter(m=>{
    const sm=auditSite==='All'||m.site_id===auditSite;
    const lm=auditLine==='All'||m.location_zone===auditLine;
    return sm&&lm;
  });
  const fmIds=new Set(filteredMachines.map(m=>m.id));

  // Get visible tasks
  const visibleTasks=state.pmTasks.filter(t=>fmIds.has(t.machine_id));

  // Expected completions per task for the period
  function expectedCount(freq){
    const days=parseInt(auditRange==='365'?365:auditRange==='30'?30:7);
    if(freq==='Daily') return days;
    if(freq==='Weekly') return Math.floor(days/7);
    if(freq==='Monthly') return Math.floor(days/30);
    return 1;
  }

  // Group completions by task_id
  const compsByTask={};
  (comps||[]).forEach(c=>{
    if(!compsByTask[c.pm_task_id]) compsByTask[c.pm_task_id]=[];
    compsByTask[c.pm_task_id].push(c);
  });

  // Build rows — filter by search
  const rows=visibleTasks.filter(t=>{
    if(!auditSearch) return true;
    const m=getMachine(t.machine_id);
    return t.task_name.toLowerCase().includes(auditSearch.toLowerCase())
      ||(m?.name||'').toLowerCase().includes(auditSearch.toLowerCase())
      ||(m?.machine_code||'').toLowerCase().includes(auditSearch.toLowerCase());
  });

  // Summary stats
  const totalTasks=rows.length;
  const tasksWithAnyCompletion=rows.filter(t=>(compsByTask[t.id]||[]).length>0).length;
  const totalCompletions=rows.reduce((s,t)=>s+(compsByTask[t.id]||[]).length,0);
  const overallPct=totalTasks?Math.round(tasksWithAnyCompletion/totalTasks*100):0;

  // Site/line filter options
  const siteOpts=['All',...new Set(state.machines.filter(m=>m.site_id).map(m=>m.site_id))].map(sid=>{
    if(sid==='All')return{id:'All',label:'All Sites'};
    const s=state.sites.find(x=>x.id===sid);return{id:sid,label:s?.name||sid};
  });
  const sfm=auditSite==='All'?state.machines:state.machines.filter(m=>m.site_id===auditSite);
  const lineOpts=['All',...new Set(sfm.filter(m=>m.location_zone).map(m=>m.location_zone))];

  // Colour for % badge
  function pctColor(pct){ return pct>=80?'#22c55e':pct>=50?'#f97316':'#ef4444'; }
  function pctBg(pct){ return pct>=80?'rgba(34,197,94,.12)':pct>=50?'rgba(249,115,22,.12)':'rgba(239,68,68,.12)'; }

  // Build table rows
  const tableRows=rows.map(t=>{
    const m=getMachine(t.machine_id);
    const site=state.sites.find(s=>s.id===m?.site_id);
    const tc=compsByTask[t.id]||[];
    const exp=expectedCount(t.frequency);
    const actual=tc.length;
    const pct=exp>0?Math.min(100,Math.round(actual/exp*100)):0;
    const isExp=auditExpanded[t.id];

    const detailRows=isExp?tc.map(c=>`
      <div style="display:grid;grid-template-columns:160px 1fr 120px;gap:0;padding:7px 12px 7px 48px;border-bottom:1px solid rgba(48,54,61,.4);font-size:12px;background:var(--bg)">
        <span style="color:var(--muted)">${new Date(c.completed_at).toLocaleString('en-AU',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
        <span style="color:var(--text);font-weight:500">${esc(c.completed_by)}</span>
        <span style="color:var(--muted);font-size:11px">${esc(c.shift||'')}</span>
      </div>`).join(''):'';

    return`<div>
      <div style="display:grid;grid-template-columns:36px 1fr 140px 80px 90px 100px 80px;align-items:center;padding:0;border-bottom:1px solid rgba(48,54,61,.5);cursor:pointer;transition:background .1s" 
           onclick="auditExpanded['${t.id}']=!auditExpanded['${t.id}'];renderAudit()" 
           onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background=''">
        <div style="padding:10px;text-align:center;color:var(--muted);font-size:14px">${isExp?'▾':'▸'}</div>
        <div style="padding:10px 12px">
          <div style="font-weight:500;font-size:13px">${esc(t.task_name)}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(m?.machine_code||'')} · ${esc(m?.name||'')} · ${esc(site?.name||'')}${m?.location_zone?' · '+m.location_zone:''}</div>
        </div>
        <div style="padding:10px 12px">
          <span class="badge" style="background:rgba(255,255,255,.07);color:var(--muted)">${t.frequency}</span>
        </div>
        <div style="padding:10px 12px;font-size:13px;color:var(--muted);text-align:center">${exp}</div>
        <div style="padding:10px 12px;font-size:13px;font-weight:700;text-align:center;color:${actual>0?'var(--text)':'var(--muted)'}">${actual}</div>
        <div style="padding:10px 12px;text-align:center">
          <span style="background:${pctBg(pct)};color:${pctColor(pct)};padding:3px 10px;border-radius:4px;font-family:var(--fd);font-size:13px;font-weight:700">${pct}%</span>
        </div>
        <div style="padding:10px 12px;text-align:center">
          ${actual>0?`<span style="font-size:11px;color:var(--muted)">${tc.length} record${tc.length!==1?'s':''}</span>`:'<span style="font-size:11px;color:rgba(239,68,68,.6)">None</span>'}
        </div>
      </div>
      ${detailRows}
    </div>`;
  }).join('');

  $('content').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <select class="btn btn-ghost btn-sm" style="padding:6px 11px" onchange="auditRange=this.value;renderAudit()">
          <option value="7"${auditRange==='7'?' selected':''}>Last 7 days</option>
          <option value="30"${auditRange==='30'?' selected':''}>Last 30 days</option>
          <option value="365"${auditRange==='365'?' selected':''}>Last 12 months</option>
        </select>
        <select style="width:160px" onchange="auditSite=this.value;auditLine='All';renderAudit()">
          ${siteOpts.map(s=>`<option value="${s.id}"${auditSite===s.id?' selected':''}>${s.label}</option>`).join('')}
        </select>
        <select style="width:160px" onchange="auditLine=this.value;renderAudit()">
          ${lineOpts.map(l=>`<option value="${l}"${auditLine===l?' selected':''}>${l==='All'?'All Lines':l}</option>`).join('')}
        </select>
        <input placeholder="Search task or machine…" value="${esc(auditSearch)}" id="search-audit" oninput="auditSearch=this.value;keepFocus('search-audit');renderAudit();restoreFocus()" style="width:220px">
        <button class="btn btn-ghost btn-sm" onclick="auditSite='All';auditLine='All';auditSearch='';auditRange='30';renderAudit()">Clear</button>
      </div>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
      <div class="stat"><div class="stat-num" style="color:var(--accent)">${totalTasks}</div><div class="stat-label">Tasks in scope</div></div>
      <div class="stat ${overallPct>=80?'ok-card':overallPct>=50?'warn-card':'alert-card'}">
        <div class="stat-num" style="color:${pctColor(overallPct)}">${overallPct}%</div>
        <div class="stat-label">Tasks with any completion</div>
      </div>
      <div class="stat"><div class="stat-num" style="color:var(--pureau)">${totalCompletions}</div><div class="stat-label">Total completions logged</div></div>
      <div class="stat ${tasksWithAnyCompletion===totalTasks?'ok-card':'warn-card'}">
        <div class="stat-num" style="color:${tasksWithAnyCompletion===totalTasks?'var(--green)':'var(--orange)'}">${totalTasks-tasksWithAnyCompletion}</div>
        <div class="stat-label">Tasks with no record</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:grid;grid-template-columns:36px 1fr 140px 80px 90px 100px 80px;background:var(--navy);padding:0">
        <div style="padding:10px"></div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6)">Task / Machine</div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6)">Frequency</div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center">Expected</div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center">Actual</div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center">Rate</div>
        <div style="padding:10px 12px;font-family:var(--fd);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.6);text-align:center">Records</div>
      </div>
      ${rows.length?tableRows:`<div class="empty">No tasks match the current filters.</div>`}
    </div>
    ${rows.length?`<div style="font-size:12px;color:var(--muted);margin-top:8px;text-align:right">Click any row to expand completion records · ${totalCompletions} total completion${totalCompletions!==1?'s':''} logged</div>`:''}
  `;
}

async function handleMachineXlsx(file){
  if(!file)return;
  if(!file.name.match(/\.xlsx?$/i)){showToast('Please upload an .xlsx or .xls file.','error');return;}
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=window.XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=window.XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!data.length){showToast('No data found in spreadsheet.','error');return;}

      const norm=key=>key.toLowerCase().replace(/[^a-z0-9]/g,'');
      const getVal=(row,candidates)=>{
        for(const k of Object.keys(row)){
          if(candidates.includes(norm(k)))return String(row[k]).trim();
        }
        return'';
      };

      const rows=data.map(row=>({
        machine_code: getVal(row,['machinecode','code','machine_code','mchcode','machcode']),
        name:         getVal(row,['name','machinename','machine_name','description']),
        category:     getVal(row,['category','cat']),
        site_name:    getVal(row,['site','sitename','site_name']),
        location_zone:getVal(row,['locationzone','location_zone','zone','line','location']),
        line_type:    getVal(row,['linetype','line_type']),
        oem_manufacturer: getVal(row,['oemmanufacturer','oem_manufacturer','oem','manufacturer']),
        criticality:  getVal(row,['criticality','critical','crit'])||'High',
        status:       getVal(row,['status'])||'Active',
        serial_number:getVal(row,['serialnumber','serial_number','serial']),
        year_installed:getVal(row,['yearinstalled','year_installed','year']),
        notes:        getVal(row,['notes','note','comments']),
      })).filter(r=>r.machine_code&&r.name);

      const existingCodes=new Set(state.machines.map(m=>m.machine_code));
      const updates=rows.filter(r=>existingCodes.has(r.machine_code)).map(r=>r.machine_code);
      const additions=rows.filter(r=>!existingCodes.has(r.machine_code)).map(r=>r.machine_code);

      machineXlsxPreview={rows,updates,additions};
      renderMachineImportPanel();
    }catch(err){showToast('Error reading file: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

async function confirmMachineImport(){
  const btn=$('confirm-machine-import-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Importing…';}
  const {rows,updates,additions}=machineXlsxPreview;
  let ok=0,fail=0;

  for(const r of rows){
    // Resolve site_id from name
    const site=state.sites.find(s=>s.name.toLowerCase()===r.site_name.toLowerCase())||
                state.sites.find(s=>s.name.toLowerCase().includes(r.site_name.toLowerCase()));
    const payload={
      name:r.name, category:r.category||null,
      site_id:site?.id||null,
      location_zone:r.location_zone||null,
      line_type:r.line_type||null,
      oem_manufacturer:r.oem_manufacturer||null,
      criticality:r.criticality||'High',
      status:r.status||'Active',
      serial_number:r.serial_number||null,
      year_installed:r.year_installed?parseInt(r.year_installed):null,
      notes:r.notes||null,
      is_active:true,
    };

    if(updates.includes(r.machine_code)){
      // Update existing
      const existing=state.machines.find(m=>m.machine_code===r.machine_code);
      if(existing){
        const {error}=await sb.from('machines').update(payload).eq('id',existing.id);
        if(error)fail++;else ok++;
      }
    } else {
      // Insert new
      const {error}=await sb.from('machines').insert({...payload,machine_code:r.machine_code});
      if(error)fail++;else ok++;
    }
  }

  // Refresh state
  const fresh=await sb.from('machines').select('*').order('machine_code');
  state.machines=fresh.data||[];
  showToast(`Done — ${ok} machines updated/added.${fail?` ${fail} failed.`:''}`);
  machineImportView=false; machineXlsxPreview=null;
  renderMachines();
}

async function handleXlsxFile(file){
  if(!file)return;
  if(!file.name.match(/\.xlsx?$/i)){showToast('Please upload an .xlsx or .xls file.','error');return;}

  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      // SheetJS loaded in <head>
      const wb=window.XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=window.XLSX.utils.sheet_to_json(ws,{defval:''});

      if(!data.length){showToast('No data found in spreadsheet.','error');return;}

      // Normalise column names — case insensitive, trim spaces
      const norm=key=>key.toLowerCase().replace(/[^a-z0-9]/g,'');
      const getVal=(row,candidates)=>{
        for(const k of Object.keys(row)){
          if(candidates.includes(norm(k))) return String(row[k]).trim();
        }
        return '';
      };

      const rows=data.map((row,i)=>{
        const partCode=getVal(row,['partcode','partno','code','part_code','partcode']);
        const name=getVal(row,['partname','name','description','part_name','partname']);
        const machineCode=getVal(row,['machinecode','machine_code','machinecode','mchcode']);
        const machineName=getVal(row,['machinename','machine_name','machinename','machine']);
        // Match machine by code first, then name
        const machine=state.machines.find(m=>
          (machineCode&&m.machine_code.toLowerCase()===machineCode.toLowerCase())||
          (machineName&&m.name.toLowerCase()===machineName.toLowerCase())
        );
        return{
          _row:i+2,
          part_code:partCode||`IMPORT-${i+1}`,
          name:name||'Unknown Part',
          machine_id:machine?.id||null,
          machine_name:machine?.name||machineName||machineCode||'',
          criticality:getVal(row,['criticality','critical','crit'])||'High',
          min_qty:parseInt(getVal(row,['minqty','min_qty','minimum','minstock']))||1,
          max_qty:parseInt(getVal(row,['maxqty','max_qty','maximum','maxstock']))||5,
          current_qty:parseInt(getVal(row,['currentqty','current_qty','qty','quantity','onhand','currentstock']))||0,
          bin_location:getVal(row,['binlocation','bin_location','bin','location','shelf'])||'',
          is_consumable:['yes','true','1'].includes(getVal(row,['isconsumable','consumable','is_consumable']).toLowerCase()),
        };
      }).filter(r=>r.part_code&&r.name);

      // Find conflicts
      const existingCodes=new Set(state.spareParts.map(p=>p.part_code));
      const conflicts=rows.filter(r=>existingCodes.has(r.part_code)).map(r=>r.part_code);

      xlsxPreview={rows,conflicts};
      renderStock();
    } catch(err){
      showToast('Error reading file: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

async function confirmXlsxImport(){
  const btn=$('confirm-import-btn');
  if(!btn)return;
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Importing…';
  const {rows,conflicts}=xlsxPreview;
  const newRows=rows.filter(r=>!conflicts.includes(r.part_code));
  let ok=0,fail=0;
  for(const r of newRows){
    const {error}=await sb.from('spare_parts').insert({
      part_code:r.part_code, name:r.name, machine_id:r.machine_id||null,
      criticality:r.criticality, min_qty:r.min_qty, max_qty:r.max_qty,
      current_qty:r.current_qty, bin_location:r.bin_location||null,
      is_consumable:r.is_consumable||false, nsf_h1_certified:false,
    });
    if(error)fail++;else ok++;
  }
  const fresh=await sb.from('spare_parts').select('*').order('part_code');
  state.spareParts=fresh.data||[];
  state.stockAlerts=state.spareParts.filter(p=>p.current_qty<=p.min_qty).length;
  showToast(`Imported ${ok} parts.${fail?` ${fail} failed.`:''}`);
  xlsxPreview=null; stockView='list';
  renderNav(); renderStock();
}

async function saveNewPart(){
  const f=newPartForm;
  if(!f.part_code||!f.name){showToast('Part code and name are required.','error');return;}
  const existing=state.spareParts.find(p=>p.part_code===f.part_code);
  if(existing){showToast(`Part code ${f.part_code} already exists.`,'error');return;}
  const btn=$('save-part-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Saving…';
  const {data,error}=await sb.from('spare_parts').insert({
    part_code:f.part_code.trim(), name:f.name.trim(),
    machine_id:f.machine_id||null, criticality:f.criticality,
    min_qty:parseInt(f.min_qty)||1, max_qty:parseInt(f.max_qty)||5,
    current_qty:parseInt(f.current_qty)||0,
    bin_location:f.bin_location||null, is_consumable:f.is_consumable||false,
    nsf_h1_certified:false,
  }).select().single();
  if(error){showToast('Error: '+error.message,'error');btn.disabled=false;btn.textContent='Add Spare Part';return;}
  state.spareParts.push(data);
  state.stockAlerts=state.spareParts.filter(p=>p.current_qty<=p.min_qty).length;
  showToast(`${data.name} added.`);
  newPartForm={part_code:'',name:'',machine_id:'',criticality:'High',min_qty:'1',max_qty:'5',current_qty:'0',bin_location:'',is_consumable:false};
  stockView='list'; renderNav(); renderStock();
}

function downloadPartsTemplate(){
  // Generate a CSV template — no library needed
  const headers=['Part Code','Part Name','Machine Code','Machine Name','Criticality','Min Qty','Max Qty','Current Qty','Bin Location','Is Consumable'];
  const example=['SP-019','Example Part Name','MCH-001','Scholle Filler Line A','High','2','6','3','SH-A-05','No'];
  const csv=[headers,example].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='ABH_Spare_Parts_Import_Template.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Template downloaded.');
}

async function saveStock(partId,currentQty){
  const newQty=parseFloat(editQty);
  if(isNaN(newQty)||newQty<0){showToast('Invalid quantity.','error');return;}
  const {error}=await sb.from('stock_transactions').insert({spare_part_id:partId,transaction_type:editReason,quantity:newQty-currentQty,qty_before:currentQty,qty_after:newQty,notes:'Manual update via app'});
  if(error){showToast('Error: '+error.message,'error');return;}
  const idx=state.spareParts.findIndex(p=>p.id===partId);
  if(idx>-1)state.spareParts[idx].current_qty=newQty;
  state.stockAlerts=state.spareParts.filter(p=>p.current_qty<=p.min_qty).length;
  editingPart=null;showToast('Stock updated.');renderNav();renderStock();
}

function openStaffForm(id){
  if(id===null){
    staffEditId='new';
    staffForm={employee_id:'',name:'',role:'Operator',site_id:'',line_type:'all',is_active:true,can_approve_wo:false};
  } else {
    staffEditId=id;
    const s=state.staff.find(x=>x.id===id);
    if(s) staffForm={employee_id:s.employee_id||'',name:s.name,role:s.role||'Operator',site_id:s.site_id||'',line_type:s.line_type||'all',is_active:s.is_active!==false,employment_status:s.employment_status||'Employed',can_approve_wo:s.can_approve_wo||false};
  }
  renderStaff();
}

async function saveStaff(){
  if(!staffForm.name||!staffForm.employee_id||!staffForm.site_id){
    showToast('Employee ID, name and site are required.','error'); return;
  }
  const btn=$('save-staff-btn'); btn.disabled=true; btn.innerHTML='<div class="spinner"></div> Saving…';
  const payload={
    employee_id:staffForm.employee_id.trim(),
    name:staffForm.name.trim(),
    role:staffForm.role,
    site_id:staffForm.site_id,
    line_type:staffForm.line_type,
    is_active:staffForm.employment_status==='Employed',
    employment_status:staffForm.employment_status,
    can_approve_wo:staffForm.can_approve_wo,
  };
  let error;
  if(staffEditId==='new'){
    const {data,error:err}=await sb.from('staff').insert(payload).select().single();
    error=err;
    if(!error&&data){ state.staff.push(data); showToast(`${data.name} added.`); }
  } else {
    ({error}=await sb.from('staff').update(payload).eq('id',staffEditId));
    if(!error){
      const idx=state.staff.findIndex(s=>s.id===staffEditId);
      if(idx>-1) state.staff[idx]={...state.staff[idx],...payload};
      showToast('Staff member updated.');
    }
  }
  if(error){ showToast('Error: '+error.message,'error'); btn.disabled=false; btn.textContent='Save'; return; }
  staffEditId=null;
  renderNav();
  renderStaff();
}

async function toggleStaffActive(id, newActive){
  const {error}=await sb.from('staff').update({is_active:newActive}).eq('id',id);
  if(error){ showToast('Error: '+error.message,'error'); return; }
  const idx=state.staff.findIndex(s=>s.id===id);
  if(idx>-1) state.staff[idx].is_active=newActive;
  showToast(newActive?'Staff member activated.':'Staff member deactivated.');
  renderStaff();
}

// ── EXPORT FUNCTIONS ───────────────────────────────────────

function csvEscape(val){
  const s=String(val===null||val===undefined?'':val);
  return s.includes(',')||s.includes('"')||s.includes('\n')?`"${s.replace(/"/g,'""')}"`:s;
}

function downloadCSV(filename, headers, rows){
  const lines=[headers.map(csvEscape).join(','),...rows.map(r=>r.map(csvEscape).join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`${filename} downloaded.`);
}

function exportMachines(){
  const headers=['Machine Code','Name','Category','Site','Location Zone','Line Type','OEM Manufacturer','Country of Origin','Criticality','Status','Serial Number','Year Installed','Notes'];
  const rows=state.machines.map(m=>{
    const site=state.sites.find(s=>s.id===m.site_id);
    return[m.machine_code,m.name,m.category||'',site?.name||'',m.location_zone||'',m.line_type||'',m.oem_manufacturer||'',m.country_of_origin||'',m.criticality||'',m.status||'',m.serial_number||'',m.year_installed||'',m.notes||''];
  });
  downloadCSV(`ABH_Machine_Register_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function exportSpareParts(){
  const headers=['Part Code','Part Name','Machine Code','Machine Name','Criticality','Min Qty','Max Qty','Current Qty','Bin Location','Is Consumable','NSF H1 Certified'];
  const rows=state.spareParts.map(p=>{

  });
  downloadCSV(`ABH_Spare_Parts_${new Date().toISOString().slice(0,10)}.csv`, headers, rows);
}

function exportPMTasks(){
  const headers=['Task Code','Machine Code','Machine Name','Task Name','Frequency','Craft','Est. Duration (mins)','SOP Reference','Compliance Requirement','NSF H1 Lubricant'];

  for(const m of MACHINE_SEED){

    const {error}=await sb.from('machines').upsert({...m,site_id:siteId},{onConflict:'machine_code',ignoreDuplicates:true});

}

async function importPMTasks(){

  state.pmTasks=fresh.data||[];

  btn.disabled=false;btn.textContent='Import Preventive Tasks';renderSetup();
}

function confirmClearWorkOrders(){
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML=`<div style="background:var(--surface);border:1px solid var(--red);border-radius:10px;padding:24px;max-width:400px;width:100%">
    <div style="font-family:var(--fd);font-size:20px;font-weight:700;color:var(--red);margin-bottom:8px">&#9888; Danger Zone</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.6">This will permanently delete ALL work orders and cannot be undone. Type the password to confirm.</p>
    <input id="danger-pw" type="password" placeholder="Enter password…" style="width:100%;margin-bottom:12px" onkeydown="if(event.key==='Enter')document.getElementById('danger-confirm-btn').click()">
    <div style="font-size:11px;color:var(--red);margin-bottom:16px" id="danger-err"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="this.closest('[style*=fixed]').remove()">Cancel</button>
      <button class="btn btn-danger" id="danger-confirm-btn" onclick="
        const pw=document.getElementById('danger-pw').value;
        const err=document.getElementById('danger-err');
        if(pw!=='Pureau10L'){err.textContent='Incorrect password.';return;}
        this.closest('[style*=fixed]').remove();
        clearWorkOrders();
      ">Confirm Delete</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('danger-pw')?.focus(),50);
}

      <div class="fg"><label>Machine Code *</label><input value="${esc(machineForm.machine_code)}" onchange="machineForm.machine_code=this.value" placeholder="MCH-023"></div>
      <div class="fg"><label>Name *</label><input value="${esc(machineForm.name)}" onchange="machineForm.name=this.value" placeholder="Machine name"></div>
      <div class="fg"><label>Site *</label><select onchange="machineForm.site_id=this.value"><option value="">— Select site —</option>${state.sites.map(s=>`<option value="${s.id}"${machineForm.site_id===s.id?' selected':''}>${esc(s.name)}</option>`).join('')}</select></div>
      <div class="fg"><label>Category</label><select onchange="machineForm.category=this.value">${['','Filling','Packaging','Coding','Labelling','Carton Erecting','Bottle Handling','Rinsing','Utilities','Other'].map(c=>`<option${machineForm.category===c?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="fg full"><label>OEM / Manufacturer</label><input value="${esc(machineForm.oem_manufacturer)}" onchange="machineForm.oem_manufacturer=this.value" placeholder="e.g. Scholle Packaging"></div>
      <div class="fg"><label>Location Zone</label><input value="${esc(machineForm.location_zone)}" onchange="machineForm.location_zone=this.value" placeholder="e.g. Line A"></div>
      <div class="fg"><label>Criticality</label><select onchange="machineForm.criticality=this.value">${['Critical','High','Medium','Low'].map(c=>`<option${machineForm.criticality===c?' selected':''}>${c}</option>`).join('')}</select></div>
      <div class="fg"><label>Status</label><select onchange="machineForm.status=this.value">${['Active','Under Repair','Awaiting Parts','Inactive','Decommissioned'].map(s=>`<option${machineForm.status===s?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="fg"><label>Serial Number</label><input value="${esc(machineForm.serial_number)}" onchange="machineForm.serial_number=this.value" placeholder="Optional"></div>
      <div class="fg"><label>Year Installed</label><input type="number" value="${esc(machineForm.year_installed)}" onchange="machineForm.year_installed=this.value" placeholder="e.g. 2019"></div>
      <div class="fg full"><label>Notes</label><textarea onchange="machineForm.notes=this.value" placeholder="Any additional information…">${esc(machineForm.notes)}</textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeMachineModal()">Cancel</button><button class="btn btn-primary" onclick="saveMachine()" id="save-machine-btn">${machineForm.id?'Save Changes':'Add Machine'}</button></div>
  </div>`;
}

function closeMachineModal(){ $('machine-modal').style.display='none';$('machine-modal').innerHTML=''; }

async function saveMachine(){
  if(!machineForm.name||!machineForm.machine_code||!machineForm.site_id){showToast('Machine code, name and site are required.','error');return;}
  const btn=$('save-machine-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Saving…';
  const payload={machine_code:machineForm.machine_code.trim(),name:machineForm.name.trim(),category:machineForm.category||null,site_id:machineForm.site_id,oem_manufacturer:machineForm.oem_manufacturer||null,location_zone:machineForm.location_zone||null,criticality:machineForm.criticality,status:machineForm.status,serial_number:machineForm.serial_number||null,year_installed:machineForm.year_installed?parseInt(machineForm.year_installed):null,notes:machineForm.notes||null,is_active:true};
  let error;
  if(machineForm.id){({error}=await sb.from('machines').update(payload).eq('id',machineForm.id));if(!error){const idx=state.machines.findIndex(m=>m.id===machineForm.id);if(idx>-1)state.machines[idx]={...state.machines[idx],...payload};showToast('Machine updated.');}}
  else{const {data,error:err}=await sb.from('machines').insert(payload).select().single();error=err;if(!error&&data){state.machines.push(data);selectedMachine=data;showToast(`Machine ${data.machine_code} added.`);}}
  if(error){showToast('Error: '+error.message,'error');btn.disabled=false;btn.textContent='Save';return;}
  closeMachineModal();renderMachines();
}

// ── INIT ───────────────────────────────────────────────────
initDate();
renderNav();
loadAll();
</script>
